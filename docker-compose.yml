# =============================================================================
# CardDemo Development Environment - Docker Compose Configuration
# =============================================================================
# 
# Purpose: Complete orchestration of CardDemo application development environment
# Architecture: Spring Boot modular monolith with PostgreSQL and Redis backing services
# 
# This Docker Compose configuration provides:
# - Spring Boot application container with hot reload capabilities
# - PostgreSQL 15+ database with persistent storage and initialization scripts
# - Redis 7+ for distributed session management and caching
# - Development-optimized networking and service discovery
# - Volume persistence for data and development productivity
# - Environment variable configuration for flexible deployment
#
# Services Architecture:
# 1. app: Spring Boot application (ports 8080, 8081)
# 2. postgresql: PostgreSQL 15-alpine database (port 5432)
# 3. redis: Redis 7-alpine cache and session store (port 6379)
#
# Network: carddemo-network (bridge driver for service communication)
# Volumes: postgres-data, redis-data (persistent storage)
#
# Development Features:
# - Hot reload support for Spring Boot development
# - Database initialization with Flyway migrations
# - Redis session persistence across container restarts
# - Comprehensive health checks and monitoring
# - Development-friendly logging and debugging
#
# Requirements Addressed:
# - Multi-service orchestration as per Summary of Changes section 0.2.3
# - PostgreSQL 15+ with persistent volume mounts and initialization scripts
# - Redis 7+ for distributed session management replacing CICS COMMAREA
# - Service networking and dependency management with proper startup order
# - Development environment setup with debugging and hot reloading capabilities
#
# @author Blitzy Development Team
# @version 1.0.0
# @since 2024-01-01
# =============================================================================

version: '3.8'

# =============================================================================
# SERVICES CONFIGURATION
# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # Spring Boot Application Service
  # ---------------------------------------------------------------------------
  app:
    # Build configuration using multi-stage Dockerfile
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        - SPRING_PROFILES_ACTIVE=dev
    
    # Container naming for development identification
    container_name: carddemo-app
    
    # Restart policy for development stability
    restart: unless-stopped
    
    # Port mappings for application access
    ports:
      - "8080:8080"  # Main application REST API endpoints
      - "8081:8081"  # Spring Boot Actuator monitoring endpoints
    
    # Environment variables for Spring Boot configuration
    environment:
      # Spring Boot profile activation
      SPRING_PROFILES_ACTIVE: dev
      
      # Database connection configuration
      DATABASE_URL: jdbc:postgresql://postgresql:5432/carddemo_dev
      DATABASE_USERNAME: carddemo_dev
      DATABASE_PASSWORD: carddemo_dev
      
      # Redis configuration for session management
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DATABASE: 0
      
      # Development-specific JVM options
      JAVA_OPTS: >-
        -Xmx512m
        -Xms256m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+UseContainerSupport
        -Djava.security.egd=file:/dev/./urandom
        -Dspring.devtools.restart.enabled=true
        -Dspring.devtools.livereload.enabled=true
      
      # Logging configuration
      LOG_LEVEL_ROOT: INFO
      LOG_LEVEL_APP: DEBUG
      LOG_LEVEL_SQL: DEBUG
      LOG_LEVEL_HIKARI: DEBUG
      LOG_LEVEL_REDIS: DEBUG
      
      # Development server configuration
      SERVER_PORT: 8080
      MANAGEMENT_SERVER_PORT: 8081
      
      # HikariCP connection pool configuration
      HIKARI_MAX_POOL_SIZE: 10
      HIKARI_MIN_IDLE: 2
      HIKARI_CONNECTION_TIMEOUT: 30000
      HIKARI_IDLE_TIMEOUT: 300000
      HIKARI_MAX_LIFETIME: 900000
      HIKARI_LEAK_DETECTION_THRESHOLD: 30000
      
      # JPA configuration
      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: true
      JPA_FORMAT_SQL: true
      JPA_BATCH_SIZE: 10
      
      # Flyway configuration
      FLYWAY_ENABLED: true
      FLYWAY_LOCATIONS: classpath:db/migration,classpath:db/dev
      FLYWAY_BASELINE_ON_MIGRATE: true
      FLYWAY_VALIDATE_ON_MIGRATE: true
      
      # JWT configuration for development
      JWT_SECRET: carddemo-dev-jwt-secret-key-for-development-only
      JWT_EXPIRATION: 7200000
      JWT_REFRESH_EXPIRATION: 86400000
      
      # Session configuration
      SESSION_TIMEOUT: 7200s
      SESSION_COOKIE_SECURE: false
      SESSION_COOKIE_MAX_AGE: 7200
      
      # CORS configuration for development
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8080,http://localhost:8081"
      CORS_ALLOWED_METHODS: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
      CORS_ALLOWED_HEADERS: "*"
      CORS_ALLOW_CREDENTIALS: true
      
      # Actuator configuration
      ACTUATOR_ENDPOINTS: "*"
      ACTUATOR_HEALTH_SHOW_DETAILS: always
      ACTUATOR_HEALTH_SHOW_COMPONENTS: always
      ACTUATOR_PROMETHEUS_ENABLED: true
      
      # Development-specific features
      SPRING_DEVTOOLS_RESTART_ENABLED: true
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: true
    
    # Volume mounts for development
    volumes:
      # Application logs
      - ./logs:/app/logs
      # Temporary files
      - ./temp:/tmp
      # Development hot reload (if using external IDE)
      - ./src:/app/src:ro
      - ./target:/app/target
    
    # Service dependencies - wait for database and redis
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    # Health check configuration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Network configuration
    networks:
      - carddemo-network
    
    # Security configuration
    user: "1001:1001"  # Non-root user as defined in Dockerfile
    
    # Resource limitations for development
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # ---------------------------------------------------------------------------
  # PostgreSQL Database Service
  # ---------------------------------------------------------------------------
  postgresql:
    # PostgreSQL 15 Alpine image for minimal footprint
    image: postgres:15-alpine
    
    # Container naming for development identification
    container_name: carddemo-postgresql
    
    # Restart policy for data persistence
    restart: unless-stopped
    
    # Port mapping for database access
    ports:
      - "5432:5432"
    
    # Environment variables for PostgreSQL configuration
    environment:
      # Database configuration
      POSTGRES_DB: carddemo_dev
      POSTGRES_USER: carddemo_dev
      POSTGRES_PASSWORD: carddemo_dev
      
      # PostgreSQL configuration
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      
      # Connection and performance settings
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_MAX_CONNECTIONS: 100
      POSTGRES_SHARED_BUFFERS: 128MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 512MB
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
      
      # Logging configuration
      POSTGRES_LOG_STATEMENT: all
      POSTGRES_LOG_DESTINATION: stderr
      POSTGRES_LOG_MIN_MESSAGES: info
      POSTGRES_LOG_MIN_ERROR_STATEMENT: error
      
      # Development-specific settings
      POSTGRES_LOG_CONNECTIONS: on
      POSTGRES_LOG_DISCONNECTIONS: on
      POSTGRES_LOG_LOCK_WAITS: on
      POSTGRES_LOG_CHECKPOINTS: on
      POSTGRES_LOG_TEMP_FILES: 0
    
    # Volume mounts for data persistence and initialization
    volumes:
      # Persistent data storage
      - postgres-data:/var/lib/postgresql/data
      
      # Database initialization scripts
      - ./src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
      
      # Custom PostgreSQL configuration
      - ./docker/postgresql/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgresql/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      
      # Development SQL scripts
      - ./docker/postgresql/dev-init.sql:/docker-entrypoint-initdb.d/00-dev-init.sql:ro
    
    # Health check configuration
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carddemo_dev -d carddemo_dev"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Network configuration
    networks:
      - carddemo-network
    
    # Security configuration
    user: postgres
    
    # Resource limitations for development
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    
    # PostgreSQL command line arguments
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c temp_file_limit=2GB
      -c log_min_duration_statement=1000
      -c log_statement=all
      -c log_connections=on
      -c log_disconnections=on
      -c log_lock_waits=on
      -c log_checkpoints=on
      -c log_temp_files=0
      -c shared_preload_libraries='pg_stat_statements'

  # ---------------------------------------------------------------------------
  # Redis Cache and Session Store Service
  # ---------------------------------------------------------------------------
  redis:
    # Redis 7 Alpine image for minimal footprint
    image: redis:7-alpine
    
    # Container naming for development identification
    container_name: carddemo-redis
    
    # Restart policy for session persistence
    restart: unless-stopped
    
    # Port mapping for Redis access
    ports:
      - "6379:6379"
    
    # Environment variables for Redis configuration
    environment:
      # Redis configuration
      REDIS_PASSWORD: ""
      REDIS_DATABASES: 16
      
      # Memory configuration
      REDIS_MAXMEMORY: 256mb
      REDIS_MAXMEMORY_POLICY: allkeys-lru
      
      # Persistence configuration
      REDIS_SAVE: "900 1 300 10 60 10000"
      REDIS_APPENDONLY: "yes"
      REDIS_APPENDFSYNC: everysec
      
      # Logging configuration
      REDIS_LOGLEVEL: notice
      REDIS_LOGFILE: ""
      
      # Development-specific settings
      REDIS_TIMEOUT: 0
      REDIS_SLOWLOG_LOG_SLOWER_THAN: 10000
      REDIS_SLOWLOG_MAX_LEN: 128
    
    # Volume mounts for data persistence
    volumes:
      # Persistent data storage
      - redis-data:/data
      
      # Custom Redis configuration
      - ./docker/redis/redis.conf:/etc/redis/redis.conf:ro
      
      # Development Redis configuration
      - ./docker/redis/redis-dev.conf:/etc/redis/redis-dev.conf:ro
    
    # Health check configuration
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Network configuration
    networks:
      - carddemo-network
    
    # Security configuration
    user: redis
    
    # Resource limitations for development
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.125'
    
    # Redis command line arguments
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
      --timeout 0
      --slowlog-log-slower-than 10000
      --slowlog-max-len 128
      --loglevel notice
      --databases 16
      --notify-keyspace-events Ex

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================
networks:
  carddemo-network:
    driver: bridge
    name: carddemo-network
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    driver_opts:
      com.docker.network.bridge.name: carddemo-br0
      com.docker.network.driver.mtu: 1500

# =============================================================================
# VOLUME CONFIGURATION
# =============================================================================
volumes:
  # PostgreSQL data persistence
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/postgres
    labels:
      - "com.carddemo.service=postgresql"
      - "com.carddemo.environment=development"
      - "com.carddemo.backup=required"
  
  # Redis data persistence
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis
    labels:
      - "com.carddemo.service=redis"
      - "com.carddemo.environment=development"
      - "com.carddemo.backup=optional"

# =============================================================================
# DEVELOPMENT ENVIRONMENT CONFIGURATION
# =============================================================================
# This configuration provides:
# 
# 1. Complete development environment with:
#    - Spring Boot application on ports 8080 (API) and 8081 (monitoring)
#    - PostgreSQL database on port 5432 with persistent storage
#    - Redis cache and session store on port 6379
# 
# 2. Service definitions with:
#    - Proper environment variable configuration
#    - Health checks and monitoring
#    - Resource limits for development workstation
#    - Security best practices (non-root users)
# 
# 3. Infrastructure configuration with:
#    - Bridge network for service communication
#    - Persistent volumes for data storage
#    - Proper service dependencies and startup order
#    - Development-optimized settings
# 
# 4. Development productivity features:
#    - Hot reload support for Spring Boot
#    - Comprehensive logging and debugging
#    - Database initialization with sample data
#    - Session persistence across container restarts
#    - Actuator endpoints for monitoring
# 
# 5. Integration with existing project structure:
#    - Uses Dockerfile for Spring Boot application build
#    - References application.yml and application-dev.yml
#    - Initializes database with V1__Create_Schema.sql
#    - Loads sample data with V2__Load_Initial_Data.sql
#    - Maintains compatibility with Kubernetes deployment
# 
# Usage:
# docker-compose up -d          # Start all services in background
# docker-compose logs -f app    # Follow application logs
# docker-compose down           # Stop all services
# docker-compose down -v        # Stop services and remove volumes
# 
# Monitoring:
# http://localhost:8080/api     # Application API endpoints
# http://localhost:8081/actuator # Spring Boot monitoring endpoints
# psql -h localhost -U carddemo_dev -d carddemo_dev  # Database access
# redis-cli -h localhost -p 6379  # Redis access
# =============================================================================