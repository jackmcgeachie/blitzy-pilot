# =============================================================================
# CardDemo Development Environment Configuration
# Spring Boot 3.2.x Development Profile Configuration
# 
# This configuration file provides development-specific settings for the CardDemo
# credit card management system migration from IBM mainframe COBOL/CICS/VSAM
# technology stack to modern Java/Spring Boot architecture.
#
# Development Environment Features:
# - Single-node PostgreSQL database for local development
# - Shared Redis instance for session management
# - Enhanced debugging and logging capabilities
# - Simplified security settings for development productivity
# - Development-optimized connection pooling
# - Comprehensive actuator endpoints for monitoring
#
# Performance Optimizations:
# - Reduced connection pool sizes for single-user development
# - Debug logging enabled for troubleshooting
# - SQL logging and formatting for database debugging
# - Extended JWT token expiration for development convenience
# - Relaxed security constraints for local testing
#
# @author Blitzy Development Team
# @version 1.0
# @since 2024-01-01
# =============================================================================

# =============================================================================
# DEVELOPMENT PROFILE ACTIVATION
# =============================================================================
spring:
  config:
    activate:
      on-profile: dev
  
  # Application name and description
  application:
    name: carddemo-application-dev
    description: CardDemo Development Environment

  # =============================================================================
  # DATABASE CONFIGURATION - Single-node PostgreSQL for Development
  # =============================================================================
  datasource:
    # Development database connection (single-node PostgreSQL)
    url: jdbc:postgresql://localhost:5432/carddemo_dev
    username: carddemo_dev
    password: carddemo_dev
    driver-class-name: org.postgresql.Driver
    
    # HikariCP Connection Pool - Development Configuration
    # Optimized for single-user development workstations
    hikari:
      pool-name: CardDemoDevHikariCP
      # Reduced pool size for development environment
      maximum-pool-size: 10
      minimum-idle: 2
      # Connection timeout settings for development
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 900000
      leak-detection-threshold: 30000
      # Connection validation and testing
      connection-test-query: SELECT 1
      validation-timeout: 5000
      # PostgreSQL-specific optimizations for development
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 100
        prepStmtCacheSqlLimit: 1024
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: true
      # Enable JMX monitoring for development debugging
      register-mbeans: true

  # =============================================================================
  # JPA/HIBERNATE CONFIGURATION - Development Settings
  # =============================================================================
  jpa:
    # Development-specific JPA settings
    show-sql: true
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Enable DDL auto-generation for development convenience
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
    
    # Enhanced Hibernate Properties for Development Debugging
    properties:
      hibernate:
        # SQL formatting and debugging enabled
        format_sql: true
        use_sql_comments: true
        generate_statistics: true
        show_sql: true
        
        # Batch processing settings for development
        jdbc:
          batch_size: 10
          fetch_size: 25
          batch_versioned_data: true
          lob:
            non_contextual_creation: true
        
        # Enable order operations for consistent output
        order_inserts: true
        order_updates: true
        
        # Connection and transaction management
        connection:
          provider_disables_autocommit: true
        
        # Disable caching for development consistency
        cache:
          use_second_level_cache: false
          use_query_cache: false
        
        # Optimistic locking configuration
        id:
          new_generator_mappings: true

  # =============================================================================
  # FLYWAY CONFIGURATION - Development Database Migration
  # =============================================================================
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/dev
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: false
    # Development-specific migration settings
    schemas: public
    table: flyway_schema_history
    sql-migration-timeout: 300
    # Placeholders for development environment
    placeholders:
      database_name: carddemo_dev
      default_schema: public
      environment: development

  # =============================================================================
  # REDIS CONFIGURATION - Shared Instance for Development
  # =============================================================================
  redis:
    # Single Redis instance for development
    host: localhost
    port: 6379
    password: ""
    database: 0
    timeout: 5000
    
    # Redis connection pool for development
    lettuce:
      pool:
        max-active: 4
        max-idle: 4
        min-idle: 0
        max-wait: 2000ms
        time-between-eviction-runs: 30s
      shutdown-timeout: 200ms

  # =============================================================================
  # SESSION MANAGEMENT - Development Configuration
  # =============================================================================
  session:
    store-type: redis
    timeout: 7200s  # 2 hours for development convenience
    cookie:
      name: CARDDEMO_DEV_SESSION
      max-age: 7200
      http-only: true
      secure: false  # HTTP allowed for local development
      same-site: lax
    redis:
      flush-mode: on_save
      namespace: carddemo:dev:session
      configure-action: notify_keyspace_events

  # =============================================================================
  # SECURITY CONFIGURATION - Development Settings
  # =============================================================================
  security:
    # Development security settings with debugging enabled
    debug: true
    
    # JWT Configuration for development
    jwt:
      secret: carddemo-dev-jwt-secret-key-for-development-only
      expiration: 7200000  # 2 hours for development convenience
      refresh-expiration: 86400000  # 24 hours for development
      header: Authorization
      token-prefix: "Bearer "
      issuer: carddemo-dev
    
    # Development user for testing
    user:
      name: devuser
      password: devpassword
      roles: ADMIN,USER

  # =============================================================================
  # BATCH PROCESSING - Development Configuration
  # =============================================================================
  batch:
    job:
      enabled: true
    initialize-schema: always
    jdbc:
      initialize-schema: always
    # Enable batch metrics for development monitoring
    metrics:
      enabled: true

# =============================================================================
# SERVER CONFIGURATION - Development Settings
# =============================================================================
server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # Development server configuration
  tomcat:
    threads:
      max: 50
      min-spare: 5
    connection-timeout: 30000
    keep-alive-timeout: 30000
    max-connections: 100
  # Enable detailed error responses for development
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always
    include-exception: true
    path: /error
    whitelabel:
      enabled: false

# =============================================================================
# LOGGING CONFIGURATION - Enhanced Development Logging
# =============================================================================
logging:
  level:
    root: INFO
    # Application-specific logging at DEBUG level
    com.carddemo: DEBUG
    com.carddemo.auth: DEBUG
    com.carddemo.service: DEBUG
    com.carddemo.controller: DEBUG
    com.carddemo.repository: DEBUG
    com.carddemo.config: DEBUG
    com.carddemo.batch: DEBUG
    
    # Spring Framework debugging
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.authentication: DEBUG
    org.springframework.security.authorization: DEBUG
    org.springframework.security.web: DEBUG
    org.springframework.boot.autoconfigure.security: DEBUG
    org.springframework.session: DEBUG
    org.springframework.batch: DEBUG
    
    # Database and JPA debugging
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.type.descriptor.sql.BasicExtractor: TRACE
    org.hibernate.engine.QueryParameters: DEBUG
    org.hibernate.engine.query.HQLQueryPlan: DEBUG
    org.hibernate.hql.internal.ast.AST: DEBUG
    
    # Connection pool debugging
    com.zaxxer.hikari: DEBUG
    com.zaxxer.hikari.HikariConfig: DEBUG
    com.zaxxer.hikari.pool.HikariPool: DEBUG
    
    # Redis debugging
    io.lettuce.core: DEBUG
    org.springframework.data.redis: DEBUG
    
    # Flyway migration debugging
    org.flywaydb: DEBUG
    
    # Transaction debugging
    org.springframework.transaction: DEBUG
    org.springframework.orm.jpa: DEBUG
    
    # Web request debugging
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.servlet.mvc.method.annotation: DEBUG
    
    # JSON processing debugging
    com.fasterxml.jackson: DEBUG
  
  # Development log file configuration
  file:
    name: logs/carddemo-dev.log
    max-size: 50MB
    max-history: 7
    total-size-cap: 500MB
  
  # Enhanced log patterns for development
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}] - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}] - %msg%n"

# =============================================================================
# ACTUATOR CONFIGURATION - Development Monitoring
# =============================================================================
management:
  # Expose all actuator endpoints for development
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
      path-mapping:
        health: health
        info: info
        metrics: metrics
        prometheus: prometheus
        loggers: loggers
        env: env
        configprops: configprops
        beans: beans
        mappings: mappings
        conditions: conditions
        threaddump: threaddump
        heapdump: heapdump
        flyway: flyway
        liquibase: liquibase
  
  # Enhanced health endpoint for development
  endpoint:
    health:
      enabled: true
      show-details: always
      show-components: always
      probes:
        enabled: true
      group:
        readiness:
          include: db,redis,diskSpace,ping
        liveness:
          include: ping,diskSpace
    
    # Enhanced info endpoint
    info:
      enabled: true
      env:
        enabled: true
      java:
        enabled: true
      os:
        enabled: true
      git:
        enabled: true
        mode: full
    
    # Metrics endpoint configuration
    metrics:
      enabled: true
      export:
        prometheus:
          enabled: true
    
    # Loggers endpoint for runtime log level changes
    loggers:
      enabled: true
    
    # Environment endpoint for configuration debugging
    env:
      enabled: true
    
    # Configuration properties endpoint
    configprops:
      enabled: true
    
    # Beans endpoint for Spring context debugging
    beans:
      enabled: true
    
    # Request mappings endpoint
    mappings:
      enabled: true
    
    # Conditions endpoint for auto-configuration debugging
    conditions:
      enabled: true
    
    # Thread dump endpoint
    threaddump:
      enabled: true
    
    # Heap dump endpoint
    heapdump:
      enabled: true
    
    # Flyway migration endpoint
    flyway:
      enabled: true
  
  # Health indicators for development
  health:
    db:
      enabled: true
    redis:
      enabled: true
    diskspace:
      enabled: true
      threshold: 100MB
    ping:
      enabled: true
    mail:
      enabled: false
  
  # Metrics configuration for development
  metrics:
    enable:
      jvm: true
      system: true
      process: true
      http: true
      logback: true
      hikaricp: true
    
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99
        spring.data.repository.invocations: 0.5, 0.9, 0.95, 0.99
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s, 2s
    
    export:
      prometheus:
        enabled: true
        step: 30s
        descriptions: true
        histogram-flavor: prometheus
    
    tags:
      application: ${spring.application.name}
      environment: development
      version: "1.0.0-SNAPSHOT"
  
  # Development management server configuration
  server:
    port: 8081
    address: 127.0.0.1

# =============================================================================
# DEVELOPMENT-SPECIFIC APPLICATION PROPERTIES
# =============================================================================
app:
  # Application metadata
  name: CardDemo Credit Card Management System - Development
  version: 1.0.0-SNAPSHOT
  description: Enterprise credit card management system - Development Environment
  
  # Development security configuration
  security:
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:8080,http://localhost:8081"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600
    
    authentication:
      max-attempts: 10  # Relaxed for development
      lockout-duration: 300000  # 5 minutes
      password-expiry-days: 365  # 1 year for development
    
    session:
      max-concurrent-sessions: 5  # Multiple sessions for development
      session-timeout: 7200  # 2 hours
  
  # Development performance configuration
  performance:
    max-connections: 50
    connection-timeout: 30000
    read-timeout: 60000
    
    cache:
      enabled: true
      ttl: 1800  # 30 minutes
      max-size: 100
  
  # Development business configuration
  business:
    transaction:
      max-amount: 50000.00  # Higher limits for testing
      daily-limit: 25000.00
      monthly-limit: 100000.00
    
    card:
      expiry-years: 5
      cvv-length: 3
      
    account:
      interest-rate: 0.15
      minimum-payment: 25.00
  
  # Development batch processing configuration
  batch:
    core-pool-size: 2
    max-pool-size: 4
    queue-capacity: 50
    thread-name-prefix: dev-batch-
    
    retry:
      max-attempts: 3
      initial-interval: 1000
      max-interval: 5000
      multiplier: 2.0
    
    skip:
      max-count: 5
    
    chunk-size: 10  # Smaller chunks for development
    job-timeout: 1800  # 30 minutes
  
  # Development environment specific settings
  dev:
    # Enable development features
    debug-mode: true
    mock-external-services: true
    auto-create-test-data: true
    
    # Development testing configuration
    testing:
      parallel-testing-enabled: true
      test-data-cleanup: true
      mock-mainframe-responses: true
    
    # Development debugging aids
    debugging:
      log-request-response: true
      log-sql-parameters: true
      log-performance-metrics: true
      log-security-events: true
      
    # Development file locations
    files:
      log-directory: "logs"
      temp-directory: "temp"
      test-data-directory: "test-data"
    
    # Development notification settings
    notifications:
      email-enabled: false
      slack-enabled: false
      console-enabled: true