# =============================================================================
# CardDemo Application Configuration
# Spring Boot 3.2.x Configuration for COBOL-to-Java Migration
# 
# This configuration file provides comprehensive Spring Boot application settings
# for the CardDemo credit card management system migration from IBM mainframe
# COBOL/CICS/VSAM technology stack to modern Java/Spring Boot architecture.
#
# Architecture Overview:
# - Spring Boot 3.2.x with Java 21 LTS
# - PostgreSQL 15+ with HikariCP connection pooling
# - Redis 7+ for distributed session management
# - Spring Security with JWT authentication
# - Spring Batch for batch processing
# - Comprehensive monitoring and observability
#
# Performance Requirements:
# - 10,000 TPS transaction capacity
# - Sub-200ms response times for card authorization
# - 4-hour batch processing windows
# - 99.9% system availability
#
# @author Blitzy Development Team
# @version 1.0
# @since 2024-01-01
# =============================================================================

# =============================================================================
# CORE APPLICATION CONFIGURATION
# =============================================================================
spring:
  application:
    name: carddemo-application
  
  # Profile Configuration - Environment-specific settings
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:development}
    include:
      - actuator
      - jpa
      - batch
      - redis
      - security
      - monitoring

  # =============================================================================
  # SERVER CONFIGURATION
  # =============================================================================
  server:
    port: ${SERVER_PORT:8080}
    servlet:
      context-path: /api
      encoding:
        charset: UTF-8
        enabled: true
        force: true
    # Performance optimization for high-throughput processing
    tomcat:
      threads:
        max: 200
        min-spare: 10
      connection-timeout: 20000
      keep-alive-timeout: 20000
      max-connections: 8192
      max-http-form-post-size: 2MB
      max-swallow-size: 2MB
    # Compression settings for optimal network performance
    compression:
      enabled: true
      mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
      min-response-size: 1024
    # Error handling configuration
    error:
      include-message: always
      include-binding-errors: always
      include-stacktrace: on_param
      include-exception: false

  # =============================================================================
  # DATABASE CONFIGURATION - PostgreSQL 15+
  # =============================================================================
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/carddemo}
    username: ${DATABASE_USERNAME:carddemo_user}
    password: ${DATABASE_PASSWORD:carddemo_password}
    driver-class-name: org.postgresql.Driver
    
    # HikariCP Connection Pool Configuration
    # Optimized for 10,000 TPS capacity requirements
    hikari:
      pool-name: CardDemoHikariCP
      # Connection pool sizing for high-throughput processing
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      # Connection timeout and lifecycle management
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION_THRESHOLD:60000}
      # Connection validation and testing
      connection-test-query: SELECT 1
      validation-timeout: 5000
      # PostgreSQL-specific optimizations
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: false
      # Enable JMX monitoring for connection pool metrics
      register-mbeans: true

  # =============================================================================
  # JPA/HIBERNATE CONFIGURATION
  # =============================================================================
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    
    # Hibernate Properties for PostgreSQL Performance Optimization
    properties:
      hibernate:
        # SQL formatting and debugging
        format_sql: ${JPA_FORMAT_SQL:false}
        use_sql_comments: false
        generate_statistics: false
        
        # Batch processing optimizations
        jdbc:
          batch_size: ${JPA_BATCH_SIZE:25}
          fetch_size: 50
          batch_versioned_data: true
          lob:
            non_contextual_creation: true
        
        # Order operations for better performance
        order_inserts: true
        order_updates: true
        
        # Connection and transaction management
        connection:
          provider_disables_autocommit: true
        
        # Disable second-level cache for consistency
        cache:
          use_second_level_cache: false
          use_query_cache: false
        
        # Optimistic locking configuration
        id:
          new_generator_mappings: true
          optimizer:
            pooled:
              preferred: pooled-lo
        
        # Temporary table configuration
        temp:
          use_jdbc_metadata_defaults: false

  # =============================================================================
  # FLYWAY DATABASE MIGRATION CONFIGURATION
  # =============================================================================
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    validate-on-migrate: ${FLYWAY_VALIDATE_ON_MIGRATE:true}
    clean-disabled: true
    # Migration strategy for incremental schema evolution
    schemas: ${FLYWAY_SCHEMAS:public}
    table: flyway_schema_history
    # Timeout settings for large migration operations
    sql-migration-timeout: 300
    # Placeholder configuration for environment-specific values
    placeholders:
      database_name: ${DATABASE_NAME:carddemo}
      default_schema: ${DEFAULT_SCHEMA:public}

  # =============================================================================
  # REDIS CONFIGURATION - Session Management and Caching
  # =============================================================================
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: ${REDIS_TIMEOUT:2000}
    
    # Redis connection pool configuration
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
        time-between-eviction-runs: 1m
      shutdown-timeout: 100ms
    
    # Redis cluster configuration (if applicable)
    cluster:
      nodes: ${REDIS_CLUSTER_NODES:}
      max-redirects: 3
    
    # Redis sentinel configuration (if applicable)
    sentinel:
      master: ${REDIS_SENTINEL_MASTER:}
      nodes: ${REDIS_SENTINEL_NODES:}

  # =============================================================================
  # SESSION MANAGEMENT CONFIGURATION
  # =============================================================================
  session:
    store-type: redis
    timeout: ${SESSION_TIMEOUT:3600s}
    cookie:
      name: CARDDEMO_SESSION
      max-age: ${SESSION_COOKIE_MAX_AGE:3600}
      http-only: true
      secure: ${SESSION_COOKIE_SECURE:false}
      same-site: lax
    redis:
      flush-mode: on_save
      namespace: carddemo:session
      configure-action: notify_keyspace_events

  # =============================================================================
  # SPRING SECURITY CONFIGURATION
  # =============================================================================
  security:
    # JWT Configuration
    jwt:
      secret: ${JWT_SECRET:carddemo-jwt-secret-key-change-in-production}
      expiration: ${JWT_EXPIRATION:3600000}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}
      header: Authorization
      token-prefix: "Bearer "
      issuer: carddemo-application
    
    # OAuth2 Configuration (if needed for external authentication)
    oauth2:
      client:
        registration: {}
        provider: {}

  # =============================================================================
  # SPRING BATCH CONFIGURATION
  # =============================================================================
  batch:
    # Job repository configuration
    job:
      enabled: ${BATCH_JOB_ENABLED:true}
    # Initialize schema automatically
    initialize-schema: ${BATCH_INITIALIZE_SCHEMA:embedded}
    # Job execution configuration
    jdbc:
      initialize-schema: embedded
    # Batch metrics and monitoring
    metrics:
      enabled: true

  # =============================================================================
  # CLOUD CONFIGURATION (if using Spring Cloud)
  # =============================================================================
  cloud:
    # Service discovery configuration
    discovery:
      enabled: ${CLOUD_DISCOVERY_ENABLED:false}
    # Circuit breaker configuration
    circuitbreaker:
      hystrix:
        enabled: ${CIRCUIT_BREAKER_ENABLED:false}

# =============================================================================
# CUSTOM APPLICATION PROPERTIES
# =============================================================================
app:
  # Application-specific configuration
  name: CardDemo Credit Card Management System
  version: 1.0.0
  description: Enterprise credit card management system migrated from COBOL/mainframe
  
  # Security Configuration
  security:
    # CORS Configuration
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
      allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
      allowed-headers: ${CORS_ALLOWED_HEADERS:*}
      allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
      max-age: ${CORS_MAX_AGE:3600}
    
    # Authentication Configuration
    authentication:
      max-attempts: ${AUTH_MAX_ATTEMPTS:5}
      lockout-duration: ${AUTH_LOCKOUT_DURATION:900000}
      password-expiry-days: ${AUTH_PASSWORD_EXPIRY_DAYS:90}
    
    # Session Configuration
    session:
      max-concurrent-sessions: ${MAX_CONCURRENT_SESSIONS:1}
      session-timeout: ${AUTH_SESSION_TIMEOUT:1800}
  
  # Performance Configuration
  performance:
    # Connection pool settings for high-throughput processing
    max-connections: ${PERFORMANCE_MAX_CONNECTIONS:200}
    connection-timeout: ${PERFORMANCE_CONNECTION_TIMEOUT:30000}
    read-timeout: ${PERFORMANCE_READ_TIMEOUT:60000}
    
    # Caching configuration
    cache:
      enabled: ${CACHE_ENABLED:true}
      ttl: ${CACHE_TTL:3600}
      max-size: ${CACHE_MAX_SIZE:1000}
  
  # Business Configuration
  business:
    # Transaction processing limits
    transaction:
      max-amount: ${TRANSACTION_MAX_AMOUNT:10000.00}
      daily-limit: ${TRANSACTION_DAILY_LIMIT:5000.00}
      monthly-limit: ${TRANSACTION_MONTHLY_LIMIT:50000.00}
    
    # Card configuration
    card:
      expiry-years: ${CARD_EXPIRY_YEARS:5}
      cvv-length: ${CARD_CVV_LENGTH:3}
      
    # Account configuration
    account:
      interest-rate: ${ACCOUNT_INTEREST_RATE:0.15}
      minimum-payment: ${ACCOUNT_MINIMUM_PAYMENT:25.00}
  
  # Batch Processing Configuration
  batch:
    # Thread pool configuration for batch job execution
    core-pool-size: ${BATCH_CORE_POOL_SIZE:4}
    max-pool-size: ${BATCH_MAX_POOL_SIZE:8}
    queue-capacity: ${BATCH_QUEUE_CAPACITY:100}
    thread-name-prefix: ${BATCH_THREAD_NAME_PREFIX:batch-}
    
    # Retry configuration for transient failures
    retry:
      max-attempts: ${BATCH_RETRY_MAX_ATTEMPTS:3}
      initial-interval: ${BATCH_RETRY_INITIAL_INTERVAL:1000}
      max-interval: ${BATCH_RETRY_MAX_INTERVAL:10000}
      multiplier: ${BATCH_RETRY_MULTIPLIER:2.0}
    
    # Skip policy configuration for failed record processing
    skip:
      max-count: ${BATCH_SKIP_MAX_COUNT:10}
    
    # Job execution configuration
    chunk-size: ${BATCH_CHUNK_SIZE:100}
    job-timeout: ${BATCH_JOB_TIMEOUT:3600}

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.carddemo: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
    org.springframework.batch: ${LOG_LEVEL_BATCH:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_SQL_PARAMS:WARN}
    com.zaxxer.hikari: ${LOG_LEVEL_HIKARI:INFO}
    io.lettuce.core: ${LOG_LEVEL_REDIS:INFO}
    org.flywaydb: ${LOG_LEVEL_FLYWAY:INFO}
  
  # Log file configuration
  file:
    name: ${LOG_FILE_NAME:logs/carddemo.log}
    max-size: ${LOG_FILE_MAX_SIZE:100MB}
    max-history: ${LOG_FILE_MAX_HISTORY:30}
    total-size-cap: ${LOG_FILE_TOTAL_SIZE_CAP:1GB}
  
  # Log pattern configuration
  pattern:
    console: ${LOG_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n}
    file: ${LOG_PATTERN_FILE:%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n}
  
  # Structured logging configuration
  config: ${LOG_CONFIG:classpath:logback-spring.xml}

# =============================================================================
# SPRING BOOT ACTUATOR CONFIGURATION
# =============================================================================
management:
  # Actuator endpoints configuration
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,info,metrics,prometheus,loggers,env,configprops,beans,mappings}
      base-path: ${ACTUATOR_BASE_PATH:/actuator}
      path-mapping:
        health: health
        info: info
        metrics: metrics
        prometheus: prometheus
  
  # Health endpoint configuration
  endpoint:
    health:
      enabled: true
      show-details: ${ACTUATOR_HEALTH_SHOW_DETAILS:when-authorized}
      show-components: ${ACTUATOR_HEALTH_SHOW_COMPONENTS:when-authorized}
      probes:
        enabled: ${ACTUATOR_HEALTH_PROBES:true}
      group:
        readiness:
          include: db,redis,diskSpace
        liveness:
          include: ping,diskSpace
    
    # Metrics endpoint configuration
    metrics:
      enabled: true
      export:
        prometheus:
          enabled: ${ACTUATOR_PROMETHEUS_ENABLED:true}
    
    # Info endpoint configuration
    info:
      enabled: true
      env:
        enabled: true
      java:
        enabled: true
      os:
        enabled: true
  
  # Health indicators
  health:
    # Database health check
    db:
      enabled: true
    # Redis health check
    redis:
      enabled: true
    # Disk space health check
    diskspace:
      enabled: true
      threshold: ${ACTUATOR_DISKSPACE_THRESHOLD:10MB}
    # Circuit breaker health check
    circuitbreakers:
      enabled: ${ACTUATOR_CIRCUIT_BREAKERS_ENABLED:false}
  
  # Metrics configuration
  metrics:
    # Enable JVM metrics
    enable:
      jvm: true
      system: true
      process: true
      http: true
      logback: true
      hikaricp: true
    
    # Distribution metrics for percentiles
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99
        spring.data.repository.invocations: 0.5, 0.9, 0.95, 0.99
      sla:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s, 2s
    
    # Prometheus metrics export
    export:
      prometheus:
        enabled: ${PROMETHEUS_METRICS_ENABLED:true}
        step: ${PROMETHEUS_METRICS_STEP:1m}
        descriptions: true
        histogram-flavor: prometheus
    
    # Custom metrics tags
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}
      version: ${app.version}
  
  # Management server configuration (if separate from main server)
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
    address: ${MANAGEMENT_SERVER_ADDRESS:127.0.0.1}

# =============================================================================
# ENVIRONMENT-SPECIFIC CONFIGURATION PROFILES
# =============================================================================

---
# =============================================================================
# DEVELOPMENT PROFILE
# =============================================================================
spring:
  config:
    activate:
      on-profile: development
  
  # Development-specific database configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/carddemo_dev
    username: carddemo_dev
    password: carddemo_dev
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  
  # Development JPA configuration
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        generate_statistics: true
  
  # Development Redis configuration
  redis:
    host: localhost
    port: 6379
    password: ""
    database: 0
  
  # Development security configuration
  security:
    jwt:
      secret: dev-jwt-secret-key
      expiration: 7200000  # 2 hours

# Development logging configuration
logging:
  level:
    root: DEBUG
    com.carddemo: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Development actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      show-components: always

---
# =============================================================================
# STAGING PROFILE
# =============================================================================
spring:
  config:
    activate:
      on-profile: staging
  
  # Staging-specific database configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://staging-db:5432/carddemo_staging}
    username: ${DATABASE_USERNAME:carddemo_staging}
    password: ${DATABASE_PASSWORD:carddemo_staging}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
  
  # Staging JPA configuration
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
  
  # Staging Redis configuration
  redis:
    host: ${REDIS_HOST:staging-redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:staging-redis-password}
    database: 0
  
  # Staging security configuration
  security:
    jwt:
      secret: ${JWT_SECRET:staging-jwt-secret-key}
      expiration: 3600000  # 1 hour

# Staging logging configuration
logging:
  level:
    root: INFO
    com.carddemo: INFO
    org.springframework.web: WARN
    org.springframework.security: INFO

# Staging actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

---
# =============================================================================
# PRODUCTION PROFILE
# =============================================================================
spring:
  config:
    activate:
      on-profile: production
  
  # Production-specific database configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://prod-db-cluster:5432/carddemo_prod}
    username: ${DATABASE_USERNAME:carddemo_prod}
    password: ${DATABASE_PASSWORD:carddemo_prod}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  
  # Production JPA configuration
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
  
  # Production Redis configuration
  redis:
    host: ${REDIS_HOST:prod-redis-cluster}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:prod-redis-password}
    database: 0
    cluster:
      nodes: ${REDIS_CLUSTER_NODES:prod-redis-cluster:6379}
      max-redirects: 3
  
  # Production security configuration
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: 3600000  # 1 hour
  
  # Production session configuration
  session:
    cookie:
      secure: true
      http-only: true
      same-site: strict

# Production logging configuration
logging:
  level:
    root: WARN
    com.carddemo: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  
  # Production log file configuration
  file:
    name: /var/log/carddemo/carddemo.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 1GB

# Production actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
      show-components: never
  server:
    port: 8081
    address: 127.0.0.1

# Production performance configuration
app:
  performance:
    max-connections: 200
    connection-timeout: 30000
    read-timeout: 60000
  
  # Production caching configuration
  cache:
    enabled: true
    ttl: 3600
    max-size: 10000